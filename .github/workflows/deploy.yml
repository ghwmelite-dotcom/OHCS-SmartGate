name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Only one deploy at a time per branch; a newer push cancels an in-flight run.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build + deploy (Worker + both Pages)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    env:
      CLOUDFLARE_ACCOUNT_ID: f4f236a6cd8fbddf397c6e9de17d8113

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ───── Gate: typecheck all three packages before any deploy ─────
      - name: Typecheck api
        run: node node_modules/typescript/bin/tsc --noEmit
        working-directory: packages/api

      - name: Typecheck web
        run: node ../../node_modules/typescript/bin/tsc --noEmit
        working-directory: packages/web

      - name: Typecheck staff
        run: node ../../node_modules/typescript/bin/tsc --noEmit
        working-directory: packages/staff

      # ───── Build both PWAs ─────
      - name: Build admin/VMS PWA
        working-directory: packages/web
        env:
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
        run: |
          node ../../node_modules/typescript/bin/tsc -b
          node ../../node_modules/vite/bin/vite.js build

      - name: Build staff PWA
        working-directory: packages/staff
        env:
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
        run: |
          node ../../node_modules/typescript/bin/tsc -b
          node ../../node_modules/vite/bin/vite.js build

      # ───── Deploy Worker ─────
      - name: Deploy API Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/api
          command: deploy

      # ───── Deploy Pages ─────
      # Note: we bypass Cloudflare Pages' built-in git integration on purpose
      # and push pre-built dist folders. Keeps build behaviour identical to
      # local deploys and avoids monorepo workspace friction on Pages builders.
      - name: Deploy admin/VMS PWA
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/web/dist --project-name=ohcs-smartgate --branch=main --commit-dirty=true

      - name: Deploy staff PWA
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/staff/dist --project-name=staff-attendance --branch=main --commit-dirty=true
