name = "ohcs-smartgate-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Attendance summaries — Ghana time (UTC+0)
# Daily: 9 AM Mon-Fri | Weekly: 4 PM Friday | Monthly: 9 AM 1st | Yearly: 9 AM Jan 1
[triggers]
crons = ["0 9 * * 1-5", "0 16 * * 5", "0 9 1 * *", "0 9 1 1 *"]

[vars]
ENVIRONMENT = "production"
VAPID_SUBJECT = "mailto:ops@ohcs.gov.gh"

[[d1_databases]]
binding = "DB"
database_name = "smartgate-db"
database_id = "4346dcc7-0a1e-488a-a97f-5273072d4d14"

[[kv_namespaces]]
binding = "KV"
id = "1357cc4c47b24cdf9001ad6ea06a705d"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "smartgate-storage"

[ai]
binding = "AI"

# Local development overrides
[env.dev]
[env.dev.vars]
ENVIRONMENT = "development"
VAPID_SUBJECT = "mailto:ops@ohcs.gov.gh"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "smartgate-db"
database_id = "4346dcc7-0a1e-488a-a97f-5273072d4d14"

[[env.dev.kv_namespaces]]
binding = "KV"
id = "1357cc4c47b24cdf9001ad6ea06a705d"

[[env.dev.r2_buckets]]
binding = "STORAGE"
bucket_name = "smartgate-storage"

[env.dev.ai]
binding = "AI"
